<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - M. Ilham</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="startMenu" class="overlay">
        <div class="menu-box">
            <h1>SNAKE GAME</h1>
            <p>Project by M. Ilham - XRPL2</p>
            <button id="btnMulai" class="btn">MULAI GAME</button>
        </div>
    </div>

    <h1>SNAKE</h1>
    <div class="score-container">
        <div>Skor: <span id="scoreVal" class="text-white">0</span></div>
        <div id="highScoreLabel">Tertinggi: <span id="highScoreVal" class="text-white">0</span></div>
    </div>
    
    <canvas id="board"></canvas>
    
    <div class="controls-hint">Gunakan W, A, S, D atau Tombol Panah untuk bergerak</div>

    <div id="gameOverMenu" class="overlay" style="display: none;">
        <div class="menu-box border-red">
            <h1 class="game-over-text">GAME OVER</h1>
            <p style="font-size: 20px;">Skor Akhir</p>
            <h2 id="finalScoreVal" class="final-score">0</h2>
            <button id="btnRestart" class="btn">MAIN LAGI</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
